<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ทำเนียบวงศ์ตระกูล</title><style>body{font-family:Tahoma;margin:0}header{padding:10px;background:#f5f5f5;display:flex;justify-content:space-between;align-items:center}#controls button{padding:8px 12px;margin:2px}#viewport{height:calc(100vh - 60px);overflow:hidden;background:#fafafa;touch-action:none}#canvas{transform-origin:0 0;position:relative;width:2000px;height:1200px}.person{position:absolute;text-align:center}.circle{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:white;border:4px solid #999;font-size:42px}.male .circle{border-color:#2196F3}.female .circle{border-color:#E91E63}.child .circle{border-color:#4CAF50}.heart{position:absolute;font-size:40px}.line{position:absolute;background:#666}</style></head><body><header><h2>🌳 ทำเนียบวงศ์ตระกูล</h2><div id="controls"><button onclick="zoom(1.2)">+</button><button onclick="zoom(0.8)">-</button><button onclick="resetView()">รีเซ็ต</button></div></header><div id="viewport"><div id="canvas"></div></div><script>const csvUrl='https://docs.google.com/spreadsheets/d/e/2PACX-1vRSlNovE5Trf1x5aKnKd5aA8htogPXgQb5RYmF-Sa0c3AZwHi3Z0Ggr4SuH_guOPhGzOFh87NYmqUbs/pub?output=csv';let scale=1,tx=0,ty=0;const canvas=document.getElementById('canvas');function apply(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;}function zoom(f){scale*=f;apply();}function resetView(){scale=1;tx=0;ty=0;apply();}let dragging=false,sx=0,sy=0;viewport.onpointerdown=e=>{dragging=true;sx=e.clientX;sy=e.clientY};viewport.onpointermove=e=>{if(!dragging)return;tx+=e.clientX-sx;ty+=e.clientY-sy;sx=e.clientX;sy=e.clientY;apply();};viewport.onpointerup=()=>dragging=false;viewport.onwheel=e=>{e.preventDefault();zoom(e.deltaY<0?1.1:0.9)};fetch(csvUrl).then(r=>r.text()).then(t=>draw(t)).catch(()=>draw('id,name,father,mother,spoues,photo
1,เภา,,,2,
2,สวัสดิ์,,,1,
3,คำเบ้า,1,2,,'));function draw(text){const rows=text.trim().split(/
?
/).slice(1).map(r=>r.split(','));canvas.innerHTML='';const data={};rows.forEach(r=>data[r[0]]={id:r[0],name:r[1],father:r[2],mother:r[3],spouse:r[4]});const p1=data['1'],p2=data['2'],c=data['3'];addPerson(400,80,p1.name,'👨','male');addPerson(600,80,p2.name,'👩','female');addHeart(530,100);addLine(548,145,4,70);if(c)addPerson(500,220,c.name,'👦','child');}function addPerson(x,y,name,icon,cls){canvas.innerHTML+=`<div class="person ${cls}" style="left:${x}px;top:${y}px"><div class="circle">${icon}</div><div>${name}</div></div>`;}function addHeart(x,y){canvas.innerHTML+=`<div class="heart" style="left:${x}px;top:${y}px">❤️</div>`;}function addLine(x,y,w,h){canvas.innerHTML+=`<div class="line" style="left:${x}px;top:${y}px;width:${w}px;height:${h}px"></div>`;}apply();</script></body></html>
