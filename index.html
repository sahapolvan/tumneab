<!DOCTYPE html>  
<html lang="th">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>ทำเนียบวงศ์ตระกูล</title>  
<style>  
*{  
    box-sizing:border-box;  
}  
  
body{  
    margin:0;  
    font-family:Tahoma,sans-serif;  
    background:#f5f5f5;  
}  
  
header{  
    position:fixed;  
    top:0;  
    left:0;  
    right:0;  
    height:60px;  
  
    display:flex;  
    align-items:center;  
    justify-content:space-between;  
  
    padding:10px 15px;  
  
    background:#ffffff;  
    box-shadow:0 2px 8px rgba(0,0,0,.1);  
  
    z-index:999;  
}  
  
header h2{  
    margin:0;  
    font-size:20px;  
}  
  
.toolbar{  
    display:flex;  
    gap:5px;  
}  
  
.toolbar button{  
    padding:8px 12px;  
    border:none;  
    border-radius:8px;  
    background:#1976d2;  
    color:white;  
    font-size:18px;  
    cursor:pointer;
}  
  
.toolbar button:active{  
    transform:scale(.95);  
}  
  
#searchBox{  
    width:140px;  
    padding:8px;  
    border:1px solid #ccc;  
    border-radius:8px;  
}  
  
#viewport{  
    margin-top:60px;  
  
    width:100%;  
    height:calc(100vh - 60px);  
  
    overflow:hidden;  
    touch-action:none;  
  
    background:transparent;
}  
  
#canvas{
    position:relative;
    min-width:100%;
    min-height:100%;
    transform-origin:0 0;
}  
.person{  
    position:absolute;  
    text-align:center;  
    cursor:pointer;
}  
  
.circle{  
    width:90px;  
    height:90px;  
  
    border-radius:50%;  
  
    display:flex;  
    align-items:center;  
    justify-content:center;  
  
    color:white;  
    font-size:42px;  
  
    box-shadow:0 2px 6px rgba(0,0,0,.25);  
}  
  
.male{  
    background:#2196F3;  
}  
  
.female{  
    background:#E91E63;  
}  
  
.person-name{  
    margin-top:6px;  
    font-size:16px;  
    white-space:nowrap;  
}  
  
.heart{  
    position:absolute;  
    font-size:32px;  
}  
  
.line{  
    position:absolute;  
    background:#666;  
}  
  
.highlight .circle{  
    border:5px solid gold;  
}  

/* เพิ่ม CSS สำหรับ Popup ที่ขาดหายไป */
#personPopup {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
.popup-content {
    background: white;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.popup-content h3 { margin-top: 0; }
.popup-content p { margin: 8px 0; font-size: 14px; }
.popup-close {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
  
@media (max-width:600px){  
  
    header h2{  
        font-size:16px;  
    }  
  
    #searchBox{  
        width:100px;  
    }  
  
    .circle{  
        width:80px;  
        height:80px;  
        font-size:36px;  
    }  
}  
</style>  
</head>  
<body>  

<header>  
    <h2>🌳 ทำเนียบวงศ์ตระกูล</h2>  
    <div class="toolbar">  
        <input type="text" id="searchBox" placeholder="ค้นหาชื่อ">  
        <button onclick="searchPerson()">🔍</button>  
        <button onclick="zoom(1.2)">+</button>  
        <button onclick="zoom(0.8)">−</button>  
        <button onclick="resetView()">🔄</button>  
    </div>
</header>  

<div id="viewport">  
    <div id="canvas"></div>
</div>  

<div id="personPopup" style="display:none;">

    <div class="popup-content">

        <div class="popup-header">

            <button
                class="popup-edit"
                onclick="openEdit()">
                ✏️
            </button>

            <button
                class="popup-close"
                onclick="closePopup()">
                ❌
            </button>

        </div>

        <div class="popup-photo">

            <img
                id="popImage"
                src="img/no-image.png"
                alt="รูปภาพ">

        </div>

        <h2 id="popName"></h2>

        <div id="popStatus">
            🟢 มีชีวิต
        </div>

        <hr>

        <div class="popup-row">
            <b>🎂 วันเกิด</b><br>
            <span id="popBirthday">-</span>
        </div>

        <div class="popup-row">
            <b>👨 บิดา</b><br>
            <span id="popFather">-</span>
        </div>

        <div class="popup-row">
            <b>👩 มารดา</b><br>
            <span id="popMother">-</span>
        </div>

        <div class="popup-row">
            <b>❤️ คู่สมรส</b><br>
            <span id="popSpouses">-</span>
        </div>

        <div class="popup-row">
            <b>👶 บุตร</b><br>
            <span id="popChildren">-</span>
        </div>

        <div class="popup-row">
            <b>☎️ ติดต่อ</b><br>
            <span id="popContact">-</span>
        </div>

        <div
            class="popup-detail-title"
            onclick="toggleDetail()">

            📖 รายละเอียด ▼

        </div>

        <div
            id="popDetailBox"
            style="display:none;">

            <span id="popDetail">-</span>

        </div>

    </div>

</div>

<!-- เรียกใช้งานสคริปต์ภายนอก -->
<script src="people.js"></script>
<script src="family.js"></script>
<script src="layout.js"></script>
<script src="tree.js"></script>
<script src="draw.js"></script>
<script src="popup.js"></script>
<script src="background1.js"></script>
    
<script>

//ดึงข้อมูลจาก Google Sheets
const DATA_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSlNovE5Trf1x5aKnKd5aA8htogPXgQb5RYmF-Sa0c3AZwHi3Z0Ggr4SuH_guOPhGzOFh87NYmqUbs/pub?output=csv";

const canvas = document.getElementById("canvas");
const viewport = document.getElementById("viewport");

let scale = 1;
let offsetX = 0;
let offsetY = 0;
    
let canvasWidth = 0;
let canvasHeight = 0;
    
let people = {};
let peopleList = [];
let positions = {};

function applyTransform(){
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

function resizeCanvas(){
    canvas.style.width = (canvasWidth + 400) + "px";
    canvas.style.height = (canvasHeight + 400) + "px";
}
    
function zoom(factor){
    scale *= factor;
    if(scale < 0.3) scale = 0.3;  
    if(scale > 3) scale = 3;  
    applyTransform();
}

function resetView(){
    scale = 1;
    offsetX = 0;
    offsetY = 0;
    applyTransform();
}

async function loadData(){
    try{  
        const response = await fetch(DATA_URL);  
        const csv = await response.text();  
        parseCSV(csv);  
        buildPeople();  
        if(typeof buildFamilies === "function") buildFamilies();
        if(typeof buildFamilyLevels === "function") buildFamilyLevels();
        if(typeof drawTree === "function") drawTree();  
    }catch(error){
        alert(error.name + "\n\n" + error.message);
    }
}

// ปรับปรุงการแยกข้อมูลให้ปลอดภัยจากสัญลักษณ์และช่องว่างแถว
function parseCSV(csv){
    const lines = csv.trim().split(/\r?\n/);  
    const headers = lines[0].split(",").map(h => h.trim());  
    peopleList = [];  

    for(let i=1; i<lines.length; i++){  
        if(!lines[i]) continue;
        const cols = lines[i].split(",");  
        let row = {};  
        headers.forEach((h, index)=>{  
            row[h] = (cols[index] || "").trim();  
        });  
        peopleList.push(row);  
    }
}

function buildPeople(){
    people = {};  
    peopleList.forEach(person=>{  
        people[person.id] = person;  
    });
}

function searchPerson(){
    const keyword = document.getElementById("searchBox").value.trim();  
    if(!keyword) return;  

    document.querySelectorAll(".person").forEach(el=>{  
        el.classList.remove("highlight");  
    });  

    const person = Object.values(people).find(p => p.name === keyword);  
    if(!person){  
        alert("ไม่พบชื่อ " + keyword);  
        return;  
    }  

    const el = document.getElementById("person-" + person.id);  
    if(!el) return;  

    el.classList.add("highlight");  
    const left = parseInt(el.style.left) || 0;  
    const top = parseInt(el.style.top) || 0;  

    offsetX = -(left - 300);  
    offsetY = -(top - 200);  
    applyTransform();
}

/* ระบบลากผัง */
let dragging = false;
let startX = 0;
let startY = 0;

viewport.addEventListener("pointerdown", e=>{
    dragging = true;  
    startX = e.clientX;  
    startY = e.clientY;
});

viewport.addEventListener("pointermove", e=>{
    if(!dragging) return;  
    offsetX += e.clientX - startX;  
    offsetY += e.clientY - startY;  
    startX = e.clientX;  
    startY = e.clientY;  
    applyTransform();
});

viewport.addEventListener("pointerup", () => { dragging = false; });
viewport.addEventListener("pointerleave", () => { dragging = false; });

/* ===== Pinch Zoom สำหรับมือถือ ===== */
let initialPinchDistance = null;
let initialScale = 1;

function getDistance(touch1, touch2){
    const dx = touch2.clientX - touch1.clientX;
    const dy = touch2.clientY - touch1.clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

viewport.addEventListener("touchstart", (e) => {
    if(e.touches.length === 2){  
        dragging = false;  
        initialPinchDistance = getDistance(e.touches[0], e.touches[1]);  
        initialScale = scale;  
    }
}, { passive: false });

viewport.addEventListener("touchmove", (e) => {
    if(e.touches.length === 2){  
        dragging = false;  
        e.preventDefault();  
        const currentDistance = getDistance(e.touches[0], e.touches[1]);  
        if(initialPinchDistance){  
            scale = initialScale * (currentDistance / initialPinchDistance);  
            if(scale < 0.3) scale = 0.3;  
            if(scale > 3) scale = 3;  
            applyTransform();
        }
    }
}, { passive: false });

viewport.addEventListener("touchend", () => { initialPinchDistance = null; });

// สั่งให้ระบบเริ่มทำงานและดึงข้อมูลเมื่อโหลดหน้าเว็บเสร็จ
window.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
